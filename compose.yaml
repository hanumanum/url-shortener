name: shortener
services:
  backend:
    build: ./shortener-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3088
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_DATABASE_NAME: shortener_db
      DB_SYNCHRONIZE: true
    ports:
      - 3088:3088
  frontend:
    build: ./shortener-frontend
    environment:
      REACT_APP_HOST: http://localhost:9999
      REACT_APP_API_BASE_URL: http://localhost:3088/api
    ports:
      - 9999:3000
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shortener_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 1s
      retries: 5
      timeout: 10s
    ports:
      - 7777:5432